# Bazzite-Sway image defaults.
# User overrides go in ~/.config/sway/config (loaded after this file).

### Autostart: agents, tray, UX helpers.
exec /usr/libexec/polkit-kde-authentication-agent-1
exec /usr/libexec/sway-systemd/session.sh
exec nm-applet --indicator
exec blueman-applet
exec autotiling
exec swayosd-server
exec gammastep -O 4500
exec mako
exec waybar

### Volume / brightness / media keys via swayosd.
bindsym XF86AudioRaiseVolume  exec swayosd-client --output-volume raise
bindsym XF86AudioLowerVolume  exec swayosd-client --output-volume lower
bindsym XF86AudioMute         exec swayosd-client --output-volume mute-toggle
bindsym XF86AudioMicMute      exec swayosd-client --input-volume mute-toggle
bindsym XF86MonBrightnessUp   exec swayosd-client --brightness raise
bindsym XF86MonBrightnessDown exec swayosd-client --brightness lower
bindsym XF86AudioPlay  exec playerctl play-pause
bindsym XF86AudioNext  exec playerctl next
bindsym XF86AudioPrev  exec playerctl previous

### Rofi bindings.
bindsym $mod+d       exec rofi -show drun
bindsym $mod+Tab     exec rofi -show window
bindsym $mod+Shift+s exec rofi -show ssh

### Logout menu.
bindsym $mod+Shift+e exec wlogout

### Screenshots (region / full → clipboard).
bindsym Print       exec grim -g "$(slurp)" - | wl-copy
bindsym Shift+Print exec grim - | wl-copy

### Terminal.
bindsym $mod+Return exec foot
